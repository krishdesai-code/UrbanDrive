{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="stylesheet" href="{% static 'css/users/account.css' %}">
    <link rel="shortcut icon" href="{% static 'img/logo.png'  %}" type="image/x-icon">
</head>

<body>
    <header>
        <div class="navbar">

            <div class="logo">
                <img src="{% static 'img/logo.png' %}" alt="logo" width="25%">
            </div>

            <div class="menu">
                <img src="{% static 'img/menu.png' %}" alt="menu" width="25%">

                <div class="menu-options">
                    <ul>
                        <li><a href="{% url 'home'  %}">Home</a></li>
                        <li><a href="{% url 'home'  %}">About</a></li>
                        <li><a href="{% url 'home'  %}">Contact</a></li>
                        <li>
                            <a href="{% url 'account'  %}">Account</a>
                        </li>
                    </ul>
                </div>
            </div>


        </div>
    </header>


    <main>
        <div class="account">
            <h1>Your Account</h1>
            <div class="upper">
                <img src="{% static 'img/account.png' %}" alt="accountlogo" width="30%">
                <input type="text" value="Username : {{username}}" readonly>
                <input type="text" value="Email Id : {{email}}" readonly>

                <button><a href="{% url 'logout'  %}">Logout</a></button>
            </div>


            <div class="lower">
                <h2>Booking Details</h2>
                {% if booking %}
                {% for b in booking %}
                <div class="booking-card">
                    <p>Booking ID: {{ b.id }}</p>
                    <p>Start: {{ b.start }}</p>
                    <p>End: {{ b.end }}</p>
                    <p>Car: {{ b.car }}</p>
                    <p>Rent: {{ b.rent }}</p>
                </div>
                {% endfor %}
                {% else %}
                <p>No bookings yet.</p>
                {% endif %}
            </div>
        </div>
    </main>
    <script src="{% static 'js/menu.js' %}"></script>
</body>

</html>
